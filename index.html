<!DOCTYPE html>
<html>
<head>
  <title>Election Guide Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>🗳️ ElectionGuide</h2>
  <div class="nav-buttons">
    <button onclick="showSection('chat')">Ask</button>
    <button onclick="showSection('timeline')">Timeline</button>
    <button onclick="showSection('glossary')">Glossary</button>
    <button onclick="showSection('quiz')">Quiz</button>
  </div>
</div>

<div class="container">
  <h1>Understand Elections, One Step at a Time</h1>

  <!-- CHAT -->
  <div id="chatSection" class="section">
    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask something..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- TIMELINE -->
  <div id="timelineSection" class="section hidden">
    <h2>📅 Election Timeline</h2>
    <div class="card">📌 Registration Deadline: Oct 1</div>
    <div class="card">🗳️ Voting Day: Nov 5</div>
    <div class="card">📊 Results: Nov 10</div>
  </div>

  <!-- GLOSSARY -->
  <div id="glossarySection" class="section hidden">
    <h2>📘 Glossary</h2>
    <div class="card"><b>EVM:</b> Electronic Voting Machine</div>
    <div class="card"><b>Constituency:</b> Voting area</div>
    <div class="card"><b>Ballot:</b> Voting method</div>
  </div>

  <!-- QUIZ -->
  <div id="quizSection" class="section hidden">
    <h2>🧠 Election Quiz</h2>

    <div id="quizBox">
      <p id="question">Question here</p>

      <div id="answers"></div>

      <button onclick="nextQuestion()">Next</button>
      <p id="score"></p>
    </div>
  </div>

</div>

<script src="script.js?v=2"></script>
</body>
</html>

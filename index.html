<!DOCTYPE html>
<html>
<head>
  <title>Election Guide Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2>🗳️ ElectionGuide</h2>
    <div class="nav-buttons">
      <button onclick="startChat()">Ask</button>
      <button onclick="showTimeline()">Timeline</button>
      <button onclick="showGlossary()">Glossary</button>
      <button onclick="showQuiz()">Quiz</button>
    </div>
  </div>

  <!-- Main -->
  <div class="container">
    <h1>Understand Elections, One Step at a Time</h1>

    <!-- Suggestions -->
    <div class="suggestions">
      <button onclick="quickAsk('register')">How do I register?</button>
      <button onclick="quickAsk('vote location')">Where do I vote?</button>
      <button onclick="quickAsk('election day')">When is election day?</button>
      <button onclick="quickAsk('documents')">Documents needed?</button>
    </div>

    <!-- Chat -->
    <div id="chatBox" class="chat-box"></div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask a question..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
